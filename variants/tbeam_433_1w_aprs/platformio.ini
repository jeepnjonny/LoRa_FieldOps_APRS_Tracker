; LilyGo T-Beam 433 1W — 433 MHz APRS multi-role (Tracker / iGate / Digipeater)
;
; ESP32-S3 with 1 W SX1262 LoRa, onboard GNSS (WAKE_UP standby control),
; SH1106 OLED, WiFi + NimBLE. No AXP2101 PMIC; battery via ADC divider.
; Default role: Tracker with GPS_INTERNAL and SmartBeaconing.
; Switch to iGate or Digipeater via web UI or serial CLI ("role set ...").
;
; Build:  pio run -e tbeam_433_1w_aprs
; Upload: pio run -e tbeam_433_1w_aprs -t upload
; FS:     pio run -e tbeam_433_1w_aprs -t uploadfs

[env:tbeam_433_1w_aprs]
extends = env:esp32
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.partitions = partitions_8mb_ota.csv
; Native ESP32-S3 USB-Serial/JTAG (ARDUINO_USB_MODE=1) gates TX flush on DTR high.
; No USB-UART bridge on this board so DTR/RTS aren't wired to bootloader straps —
; asserting DTR won't cause spurious resets.
monitor_dtr = 1
monitor_rts = 0
; Override env:esp32's monitor_filters = esp32_exception_decoder — that filter
; has known issues with native USB-Serial/JTAG streams and may eat live output.
monitor_filters =
build_flags =
    ${common.build_flags}
    ${common.usb_flags}
    -D RADIOLIB_EXCLUDE_LR11X0=1
    -D RADIOLIB_EXCLUDE_SX127X=1
    -D RADIOLIB_EXCLUDE_SX128X=1
    -D TTGO_T_BEAM_1W
lib_deps =
    ${common.lib_deps}
    ${common.display_libs}
    adafruit/Adafruit SH110X @ 2.1.10
