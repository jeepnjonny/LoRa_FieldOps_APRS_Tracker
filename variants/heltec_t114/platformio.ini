; Heltec Mesh Node T114 — nRF52840 + SX1262 + L76K GPS + ST7789 1.14" TFT.
; Pin assignments cross-checked against meshtastic's variant.h for this board:
;   github.com/meshtastic/firmware/blob/master/variants/nrf52840/heltec_mesh_node_t114
;
; Bring-up state: this env compiles; display is gated off (HAS_DISPLAY undefined)
; until the ST7789 driver path lands. Default config is hard-coded in
; setDefaultValues(); first-boot LittleFS writer comes in a later step.

[env:heltec_t114]
extends = env
platform = nordicnrf52 @ 10.6.0
board = heltec_t114
framework = arduino
; TinyUSB CDC on the Adafruit nRF52 BSP only flushes TX once the host raises
; DTR. PuTTY asserts DTR on connect; pio's miniterm doesn't unless told to,
; which makes the serial monitor look dead. Force it here.
monitor_dtr = 1
monitor_rts = 0
extra_scripts =
	${nrf52_common.extra_scripts}
build_flags =
	${nrf52_common.build_flags}
	-D HELTEC_T114
	-D ARDUINO_NRF52_ADAFRUIT
	; SX126X_DIO2_AS_RF_SWITCH and SX126X_DIO3_TCXO_VOLTAGE are defined by the
	; vendored variant.h (variants_bsp/heltec_t114/variant.h) — declaring them
	; here too would be a redefinition.
build_src_filter =
	+<*>
	-<wifi_utils.cpp>
	-<web_utils.cpp>
	-<bluetooth_utils.cpp>
; The Adafruit nRF52 BSP ships InternalFileSystem + Adafruit_LittleFS as
; framework-bundled libraries under packages/framework-arduinoadafruitnrf52/
; libraries/. Point PIO's LDF at that directory so the SPIFFS shim's
; #include <Adafruit_LittleFS.h> resolves. ${platformio.packages_dir} expands
; per-machine, so this stays portable across users.
;
; The other half of the recipe lives in src/configuration.cpp: an explicit
; #include <Adafruit_LittleFS.h> guarded on ARDUINO_ARCH_NRF52 — LDF only
; crawls includes from tracked project sources, not from headers reached via
; -I include/nrf52_shims. Without that explicit include, LDF won't notice
; the dependency even with this lib_extra_dirs entry.
lib_extra_dirs =
	${platformio.packages_dir}/framework-arduinoadafruitnrf52/libraries
lib_deps =
	${nrf52_common.lib_deps}
	${nrf52_common.display_libs}
