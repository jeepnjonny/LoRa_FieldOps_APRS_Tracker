; LilyGo TTGO T3 V1.6 — 433 MHz APRS multi-role (iGate / Digipeater / TNC)
;
; No onboard GPS: set GPS source to "Fixed" via web UI or serial CLI.
; WiFi STA + APRS-IS + TCP KISS available via iGate role.
; NimBLE KISS TNC available (APRS.fi UUID set).
; USB-serial KISS available at 115200 baud.
;
; Build:  pio run -e lilygo_t3_433_aprs
; Upload: pio run -e lilygo_t3_433_aprs -t upload
; FS:     pio run -e lilygo_t3_433_aprs -t uploadfs

[env:lilygo_t3_433_aprs]
extends = env:esp32
board = ttgo-lora32-v21
build_flags =
    ${common.build_flags}
    -D RADIOLIB_EXCLUDE_LR11X0=1
    -D RADIOLIB_EXCLUDE_SX126X=1
    -D RADIOLIB_EXCLUDE_SX128X=1
    -D LILYGO_T3_433_APRS
lib_deps =
    ${common.lib_deps}
    ${common.display_libs}
    adafruit/Adafruit SH110X @ 2.1.10
