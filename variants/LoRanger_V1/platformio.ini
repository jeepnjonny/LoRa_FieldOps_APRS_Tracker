[env:LoRanger_V1]
extends = env:esp32
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
; Native ESP32-S3 USB-Serial/JTAG (ARDUINO_USB_MODE=1) gates TX flush on DTR
; high. PuTTY asserts DTR on connect; pio's miniterm doesn't unless told.
; Safe on this board — no USB-UART bridge IC means DTR/RTS aren't wired to
; the bootloader strap pins, so this won't cause spurious resets.
monitor_dtr = 1
monitor_rts = 0
; Override env:esp32's `monitor_filters = esp32_exception_decoder` — that
; filter has known issues with native USB-Serial/JTAG streams and may be
; eating live output. Empty value disables all filters for this env.
monitor_filters =
; No OLED soldered yet — strip HAS_DISPLAY so display.cpp compiles its headless
; stubs instead of the SSD1306 path. The I2C path's display.begin() failure
; lands in `while (true) {}` and would brick first-boot bring-up.
board_build.partitions = partitions_8mb_ota.csv
build_unflags =
	-D HAS_DISPLAY=1
build_flags =
	${common.build_flags}
	${common.usb_flags}
	-D RADIOLIB_EXCLUDE_LR11X0=1
	-D RADIOLIB_EXCLUDE_SX127X=1
	-D RADIOLIB_EXCLUDE_SX128X=1
	-D LORANGER_V1
lib_deps =
	${common.lib_deps}
