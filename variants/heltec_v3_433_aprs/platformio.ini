; Heltec WiFi LoRa 32 V3 — 433 MHz APRS multi-role (iGate / Digipeater / Tracker)
;
; No onboard GPS: set GPS source to "Fixed" via web UI or serial CLI.
; WiFi STA + APRS-IS + TCP KISS available via iGate role.
; BLE KISS TNC available via NimBLE (APRS.fi UUID set).
; USB-serial KISS available at 115200 baud.
;
; Build:  pio run -e heltec_v3_433_aprs
; Upload: pio run -e heltec_v3_433_aprs -t upload
; FS:     pio run -e heltec_v3_433_aprs -t uploadfs

[env:heltec_v3_433_aprs]
extends = env:esp32
board = heltec_wifi_lora_32_V3
board_build.mcu = esp32s3
build_flags =
    ${common.build_flags}
    ${common.usb_flags}
    -D RADIOLIB_EXCLUDE_LR11X0=1
    -D RADIOLIB_EXCLUDE_SX127X=1
    -D RADIOLIB_EXCLUDE_SX128X=1
    -D HELTEC_V3_433_APRS
lib_deps =
    ${common.lib_deps}
    ${common.display_libs}
