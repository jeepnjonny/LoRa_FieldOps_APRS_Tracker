name: Commit Test Build

on:
    push:
        branches:
            - '*'

jobs:
    build:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
              target:
                - name: heltec_v3_433_aprs
                  chip: esp32s3
                - name: tbeam_433_aprs
                  chip: esp32
                - name: lilygo_t3_433_aprs
                  chip: esp32
                - name: LoRanger_V1
                  chip: esp32s3
                - name: heltec_t114
                  chip: nrf52
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.9"

            - name: Install PlatformIO Core
              run: pip install --upgrade platformio

            - name: Build target
              run: pio run -e ${{ matrix.target.name }}

            - name: Build FS
              if: matrix.target.chip != 'nrf52'
              run: pio run --target buildfs -e ${{ matrix.target.name }}
