name: Build and Publish Firmware

# Runs on every GitHub Release publish.
# Builds all 5 project targets and uploads firmware as release assets.
# The web flasher at apps.k7swi.org is updated separately by running
# ~/deploy_flasher.sh on the server after each release.

on:
    release:
        types: [published]
    workflow_dispatch:
        inputs:
            tag:
                description: 'Release tag to upload assets to (e.g. v1.0.0)'
                required: true
                type: string

permissions:
    contents: write   # required to upload assets to GitHub Releases

jobs:
    build:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                target:
                    # ESP32 targets — merged factory binary for Web Serial flashing
                    - name: heltec_v3_433_aprs
                      chip: esp32s3
                      flash_size: 8MB
                      flash_mode: dio
                      spiffs_offset: "0x5F0000"   # partitions_8mb_ota.csv

                    - name: tbeam_433_aprs
                      chip: esp32
                      flash_size: 4MB
                      flash_mode: dio
                      spiffs_offset: "0x310000"   # huge_app.csv (firmware too large for dual OTA slots)

                    - name: lilygo_t3_433_aprs
                      chip: esp32
                      flash_size: 4MB
                      flash_mode: dio
                      spiffs_offset: "0x310000"   # huge_app.csv (firmware too large for dual OTA slots)

                    - name: LoRanger_V1
                      chip: esp32s3
                      flash_size: 8MB
                      flash_mode: qio
                      spiffs_offset: "0x5F0000"   # partitions_8mb_ota.csv

                    # nRF52 target — UF2 drag-and-drop (no Web Serial support)
                    - name: heltec_t114
                      chip: nrf52

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.9"

            - name: Install build tools
              run: pip install esptool platformio adafruit-nrfutil

            - name: Build firmware
              run: pio run -e ${{ matrix.target.name }}

            - name: Build filesystem image
              if: matrix.target.chip != 'nrf52'
              run: pio run --target buildfs -e ${{ matrix.target.name }}

            # ── ESP32: assemble merged factory binary ──────────────────────
            - name: Assemble ESP32 factory binary
              if: matrix.target.chip != 'nrf52'
              run: |
                  set -e
                  mkdir -p installer/firmware

                  cp .pio/build/${{ matrix.target.name }}/firmware.bin    installer/firmware/
                  cp .pio/build/${{ matrix.target.name }}/bootloader.bin  installer/firmware/
                  cp .pio/build/${{ matrix.target.name }}/partitions.bin  installer/firmware/
                  cp .pio/build/${{ matrix.target.name }}/spiffs.bin      installer/firmware/
                  cp ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin \
                     installer/firmware/

                  CHIP="${{ matrix.target.chip }}"
                  FLASH_MODE="${{ matrix.target.flash_mode }}"
                  FLASH_SIZE="${{ matrix.target.flash_size }}"
                  SPIFFS="${{ matrix.target.spiffs_offset }}"
                  OUT="${{ matrix.target.name }}_web_factory.bin"

                  if [ "$CHIP" = "esp32" ]; then
                    esptool.py --chip esp32 merge_bin -o "$OUT" \
                      --flash_mode "$FLASH_MODE" --flash_freq 40m --flash_size "$FLASH_SIZE" \
                      0x1000   installer/firmware/bootloader.bin \
                      0x8000   installer/firmware/partitions.bin \
                      0xe000   installer/firmware/boot_app0.bin \
                      0x10000  installer/firmware/firmware.bin \
                      "$SPIFFS" installer/firmware/spiffs.bin
                  elif [ "$CHIP" = "esp32s3" ]; then
                    # ESP32-S3 bootloader starts at 0x0000, not 0x1000
                    esptool.py --chip esp32s3 merge_bin -o "$OUT" \
                      --flash_mode "$FLASH_MODE" --flash_size "$FLASH_SIZE" \
                      0x0000   installer/firmware/bootloader.bin \
                      0x8000   installer/firmware/partitions.bin \
                      0xe000   installer/firmware/boot_app0.bin \
                      0x10000  installer/firmware/firmware.bin \
                      "$SPIFFS" installer/firmware/spiffs.bin
                  fi

            - name: Upload ESP32 factory binary to release
              if: matrix.target.chip != 'nrf52'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  TAG=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
                  # Factory binary: merged image for first-time flash via web serial flasher (USB required).
                  gh release upload "$TAG" \
                    "${{ matrix.target.name }}_web_factory.bin" --clobber
                  # OTA binary: bare app binary for WiFi OTA update via the device web UI (192.168.4.1).
                  cp .pio/build/${{ matrix.target.name }}/firmware.bin \
                     ${{ matrix.target.name }}_firmware.bin
                  gh release upload "$TAG" \
                    "${{ matrix.target.name }}_firmware.bin" --clobber

            # ── nRF52: UF2 drag-and-drop + BLE DFU zip ────────────────────
            - name: Prepare nRF52 UF2
              if: matrix.target.chip == 'nrf52'
              run: |
                  cp .pio/build/${{ matrix.target.name }}/firmware.uf2 \
                     ${{ matrix.target.name }}_firmware.uf2

            - name: Generate nRF52 BLE DFU package
              if: matrix.target.chip == 'nrf52'
              run: |
                  # adafruit-nrfutil is required for the Adafruit nRF52 bootloader — Nordic's
                  # nrfutil generates a different init packet format that the Adafruit bootloader
                  # rejects, causing the board to fall back to USB/UF2 mode after DFU transfer.
                  # --dev-type 0x0052 = nRF52 family (mirrors PlatformIO's own DFU builder).
                  # --sd-req 0x00B6 = SoftDevice s140 v6.1.1 (matches boards/heltec_t114.json).
                  # --application-version omitted: PlatformIO omits it too, avoids downgrade errors.
                  adafruit-nrfutil dfu genpkg \
                    --dev-type 0x0052 \
                    --sd-req 0x00B6 \
                    --application .pio/build/${{ matrix.target.name }}/firmware.hex \
                    ${{ matrix.target.name }}_dfu.zip

            - name: Upload nRF52 firmware artifacts to release
              if: matrix.target.chip == 'nrf52'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  TAG=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
                  gh release upload "$TAG" \
                    "${{ matrix.target.name }}_firmware.uf2" --clobber
                  gh release upload "$TAG" \
                    "${{ matrix.target.name }}_dfu.zip" --clobber


    # ── Update GitHub Pages flasher manifests ───────────────────────────────
    publish-manifests:
        needs: build
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: main

            - name: Download firmware for GitHub Pages hosting
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
              run: |
                  # Firmware is served from GitHub Pages (flasher/firmware/) because
                  # github.com release download URLs block cross-origin CORS fetches.
                  mkdir -p flasher/firmware
                  gh release download "${TAG}" \
                    --repo KJ7NYE/LoRa_FieldOps_APRS_Tracker \
                    --pattern "*_web_factory.bin" \
                    --pattern "heltec_t114_firmware.uf2" \
                    --dir flasher/firmware \
                    --clobber

            - name: Generate flasher manifests
              env:
                  TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
              run: |
                  python3 tools/generate_manifests.py "${TAG}" "$(date -u +%Y-%m-%d)"

            - name: Commit and push manifests
              env:
                  TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add flasher/manifests/
                  git diff --staged --quiet || git commit -m "chore: update flasher manifests for ${TAG}"
                  git push
