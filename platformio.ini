; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = heltec_t114, heltec_v3_433_aprs, tbeam_433_aprs, tbeam_433_1w_aprs, lilygo_t3_433_aprs, LoRanger_V1

extra_configs =
	common_settings.ini
  	variants/*/platformio.ini

[env]
framework = arduino
monitor_speed = 115200
lib_ldf_mode = deep+

[env:esp32]
extends = env
platform = espressif32 @ 6.12.0
; 4MB boards (tbeam, lilygo_t3) use huge_app.csv — firmware is ~2 MB, leaving no room
; for two equal OTA slots on 4 MB flash. OTA is supported only on 8 MB boards (heltec_v3,
; LoRanger_V1) via partitions_8mb_ota.csv override in their variant platformio.ini files.
board_build.partitions = huge_app.csv
monitor_filters = esp32_exception_decoder
board_build.embed_files =
	data_embed/index.html.gz
	data_embed/style.css.gz
	data_embed/script.js.gz
	data_embed/bootstrap.css.gz
	data_embed/bootstrap.js.gz
	data_embed/favicon.png.gz
extra_scripts =
	pre:tools/compress.py
debug_tool = esp-prog